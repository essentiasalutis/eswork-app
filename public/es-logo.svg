<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="white"/>

  <!-- Doppio bordo esterno -->
  <rect x="7" y="7" width="386" height="386" fill="none" stroke="black" stroke-width="3"/>
  <rect x="15" y="15" width="370" height="370" fill="none" stroke="black" stroke-width="1.2"/>

  <!-- ® in alto a destra -->
  <text x="374" y="36" font-family="serif" font-size="18" fill="black" text-anchor="middle">®</text>

  <!-- ESSENTIA con linee -->
  <line x1="22" y1="46" x2="82" y2="46" stroke="black" stroke-width="1.5"/>
  <text x="200" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" letter-spacing="6" fill="black">ESSENTIA</text>
  <line x1="318" y1="46" x2="378" y2="46" stroke="black" stroke-width="1.5"/>

  <!-- SALUTIS con linee -->
  <line x1="22" y1="364" x2="82" y2="364" stroke="black" stroke-width="1.5"/>
  <text x="200" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" letter-spacing="6" fill="black">SALUTIS</text>
  <line x1="318" y1="364" x2="378" y2="364" stroke="black" stroke-width="1.5"/>

  <!-- Lettera E — stile geometrico blocchi -->
  <rect x="48"  y="78"  width="26"  height="232" fill="black"/>
  <rect x="74"  y="78"  width="90"  height="30"  fill="black"/>
  <rect x="74"  y="182" width="76"  height="26"  fill="black"/>
  <rect x="74"  y="280" width="90"  height="30"  fill="black"/>
  <rect x="74"  y="108" width="22"  height="74"  fill="black"/>
  <rect x="74"  y="208" width="22"  height="72"  fill="black"/>

  <!-- Lettera S — curva fluente bold -->
  <path d="M 228 86
           C 295 65, 348 105, 335 155
           C 324 192, 272 202, 252 222
           C 228 248, 240 286, 292 300
           C 320 308, 355 294, 362 272"
        fill="none" stroke="black" stroke-width="38"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
