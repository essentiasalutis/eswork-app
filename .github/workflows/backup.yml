name: Weekly Database Backup

on:
  schedule:
    # Ogni domenica alle 02:00 UTC (03:00-04:00 ora italiana)
    - cron: '0 2 * * 0'
  # Permette di avviare il backup manualmente dalla tab Actions su GitHub
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @supabase/supabase-js googleapis ws

      - name: Run backup
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: node scripts/backup.js

      - name: Commit backup to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          git commit -m "Backup automatico $(date +%Y-%m-%d)" || echo "Nessun file nuovo da committare"
          git push

      - name: Notify on failure
        if: failure()
        run: echo "::error::Backup ES Work fallito — controlla i log su GitHub Actions"
